version: 2
updates:
  - package-ecosystem: gitsubmodule
    directory: /
    target-branch: master
    schedule:
      interval: daily
      time: "03:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - submodules

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
