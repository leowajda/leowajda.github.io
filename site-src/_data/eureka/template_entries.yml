      int firstTrue(int left, int right, IntPredicate feasible) {
          int answer = -1;

          while (left <= right) {
              int mid = left + (right - left) / 2;

              if (feasible.test(mid)) {
                  answer = mid;
                  right = mid - 1;
              } else {
                  left = mid + 1;
              }
          }

          return answer;
      }
