      List<List<Integer>> subsets(int[] nums) {
          List<List<Integer>> subsets = new ArrayList<>();
          collectSubsets(0, nums, new ArrayList<>(), subsets);
          return subsets;
      }

      void collectSubsets(int index, int[] nums, List<Integer> path, List<List<Integer>> subsets) {
          subsets.add(new ArrayList<>(path));

          for (int i = index; i < nums.length; i++) {
              path.add(nums[i]);
              collectSubsets(i + 1, nums, path, subsets);
              path.remove(path.size() - 1);
          }
      }
