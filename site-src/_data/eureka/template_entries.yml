      int countCombinations(int[] nums, int target) {
          return countCombinations(0, target, nums);
      }

      int countCombinations(int index, int remaining, int[] nums) {
          if (remaining == 0) {
              return 1;
          }

          int combinations = 0;

          for (int i = index; i < nums.length; i++) {
              if (nums[i] > remaining) {
                  continue;
              }

              combinations += countCombinations(i, remaining - nums[i], nums);
          }

          return combinations;
      }
