      class Trie {
      public:
          void insert(const std::string& word) {
              Node* node = &root;

              for (char current : word) {
                  int index = current - 'a';
                  if (!node->children[index]) {
                      node->children[index] = std::make_unique<Node>();
                  }
                  node = node->children[index].get();
