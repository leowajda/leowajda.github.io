      std::vector<int> topologicalOrder(const std::vector<std::vector<int>>& graph) {
          std::vector<int> indegree(graph.size(), 0);

          for (const auto& neighbors : graph) {
              for (int neighbor : neighbors) {
                  indegree[neighbor]++;
              }
          }

          std::queue<int> queue;
          for (int node = 0; node < static_cast<int>(graph.size()); node++) {
              if (indegree[node] == 0) {
                  queue.push(node);
              }
          }

          std::vector<int> order;
          order.reserve(graph.size());

          while (!queue.empty()) {
              int node = queue.front();
              queue.pop();
              order.push_back(node);

              for (int neighbor : graph[node]) {
                  indegree[neighbor]--;
                  if (indegree[neighbor] == 0) {
                      queue.push(neighbor);
                  }
              }
          }

          return order.size() == graph.size() ? order : std::vector<int>{};
      }

