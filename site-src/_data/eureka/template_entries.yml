      def subsets(nums: Array[Int]): List[List[Int]] =
        val subsets = scala.collection.mutable.ListBuffer.empty[List[Int]]
        val path = scala.collection.mutable.ArrayBuffer.empty[Int]

        def collect(index: Int): Unit =
          subsets += path.toList

          for i <- index until nums.length do
            path += nums(i)
            collect(i + 1)
            path.remove(path.length - 1)

        collect(0)
        subsets.toList
