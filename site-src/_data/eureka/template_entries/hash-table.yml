- entry_id: hash-table-scala
  language: scala
  code: |-
    def lookupOrBuild(items: Iterable[Item]): Value =
      val seen = scala.collection.mutable.Map[Key, Value]()
      for item <- items do
        val key = keyOf(item)
        if seen.contains(key) then return merge(seen(key), item)
        seen(key) = valueOf(item)
      emptyValue()
- entry_id: hash-table-cpp
  language: cpp
  code: |-
    Value lookupOrBuild(const std::vector<Item>& items) {
        std::unordered_map<Key, Value> seen;
        for (const Item& item : items) {
            Key key = keyOf(item);
            if (seen.count(key)) return merge(seen[key], item);
            seen[key] = valueOf(item);
        }
        return emptyValue();
    }
