- entry_id: linked-list-rewire-java
  language: java
  code: |-
    ListNode reverse(ListNode head) {
        ListNode previous = null;
        while (head != null) {
            ListNode next = head.next;
            head.next = previous;
            previous = head;
            head = next;
        }
        return previous;
    }
- entry_id: linked-list-rewire-python
  language: python
  code: |-
    def reverse(head):
        previous = None
        while head:
            nxt = head.next
            head.next = previous
            previous = head
            head = nxt
        return previous
