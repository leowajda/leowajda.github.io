- entry_id: matrix-dfs-java
  language: java
  code: |-
    void dfs(int[][] grid, int row, int col) {
        if (!inside(grid, row, col) || seen(row, col)) return;
        mark(row, col);
        visit(row, col);
        dfs(grid, row + 1, col);
        dfs(grid, row - 1, col);
        dfs(grid, row, col + 1);
        dfs(grid, row, col - 1);
    }
- entry_id: matrix-dfs-python
  language: python
  code: |-
    def dfs(grid, row: int, col: int) -> None:
        if not inside(grid, row, col) or seen(row, col):
            return
        mark(row, col)
        visit(row, col)
        dfs(grid, row + 1, col)
        dfs(grid, row - 1, col)
        dfs(grid, row, col + 1)
        dfs(grid, row, col - 1)
- entry_id: matrix-dfs-scala
  language: scala
  code: |-
    def dfs(grid: Array[Array[Int]], row: Int, col: Int): Unit =
      if inside(grid, row, col) && !seen(row, col) then
        mark(row, col)
        visit(row, col)
        dfs(grid, row + 1, col)
        dfs(grid, row - 1, col)
        dfs(grid, row, col + 1)
        dfs(grid, row, col - 1)
