  code: |-
    def distances(graph: Vector[Vector[Int]], start: Int): Array[Int] =
      val dist = Array.fill(graph.length)(-1)
      val queue = scala.collection.mutable.Queue(start)
      dist(start) = 0
      while queue.nonEmpty do
        val node = queue.dequeue()
        for next <- graph(node) do
          if dist(next) == -1 then
            dist(next) = dist(node) + 1
            queue.enqueue(next)
      dist
- entry_id: graph-bfs-cpp
  language: cpp
  code: |-
    std::vector<int> distances(const std::vector<std::vector<int>>& graph, int start) {
        std::vector<int> dist(graph.size(), -1);
        std::queue<int> queue;
        dist[start] = 0;
        queue.push(start);
        while (!queue.empty()) {
            int node = queue.front();
            queue.pop();
            for (int next : graph[node]) if (dist[next] == -1) {
                dist[next] = dist[node] + 1;
                queue.push(next);
            }
        }
        return dist;
    }
