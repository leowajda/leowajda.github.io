- entry_id: graph-bfs-java
  language: java
  code: |-
    int[] distances(List<List<Integer>> graph, int start) {
        int[] dist = new int[graph.size()];
        Arrays.fill(dist, -1);
        ArrayDeque<Integer> queue = new ArrayDeque<>();
        dist[start] = 0;
        queue.add(start);
        while (!queue.isEmpty()) {
            int node = queue.remove();
            for (int next : graph.get(node)) if (dist[next] == -1) {
                dist[next] = dist[node] + 1;
                queue.add(next);
            }
        }
        return dist;
    }
- entry_id: graph-bfs-python
  language: python
  code: |-
    def distances(graph: list[list[int]], start: int) -> list[int]:
        dist = [-1] * len(graph)
        dist[start] = 0
        queue = deque([start])
        while queue:
            node = queue.popleft()
            for nxt in graph[node]:
                if dist[nxt] == -1:
                    dist[nxt] = dist[node] + 1
                    queue.append(nxt)
        return dist
