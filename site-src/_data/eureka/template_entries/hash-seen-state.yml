  code: |-
    def reachesRepeat(start: State): Boolean =
      val seen = scala.collection.mutable.Set[State]()
      var state = start
      while !seen.contains(state) do
        seen += state
        if done(state) then return false
        state = nextState(state)
      true
- entry_id: hash-seen-state-cpp
  language: cpp
  code: |-
    bool reachesRepeat(State start) {
        std::unordered_set<State> seen;
        State state = start;
        while (!seen.count(state)) {
            seen.insert(state);
            if (done(state)) return false;
            state = nextState(state);
        }
        return true;
    }
