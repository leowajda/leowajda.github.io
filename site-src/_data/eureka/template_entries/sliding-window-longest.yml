- entry_id: sliding-window-longest-java
  language: java
  code: |-
    int longestWindow(int[] values) {
        int best = 0;
        for (int left = 0, right = 0; right < values.length; right++) {
            add(values[right]);
            while (!valid()) remove(values[left++]);
            best = Math.max(best, right - left + 1);
        }
        return best;
    }
- entry_id: sliding-window-longest-python
  language: python
  code: |-
    def longest_window(values: list[int]) -> int:
        left = best = 0
        for right, value in enumerate(values):
            add(value)
            while not valid():
                remove(values[left])
                left += 1
            best = max(best, right - left + 1)
        return best
