- entry_id: graph-dfs-java
  language: java
  code: |-
    void dfs(int node, List<List<Integer>> graph, boolean[] seen) {
        seen[node] = true;
        visit(node);
        for (int next : graph.get(node)) {
            if (!seen[next]) dfs(next, graph, seen);
        }
    }
- entry_id: graph-dfs-python
  language: python
  code: |-
    def dfs(node: int, graph: list[list[int]], seen: list[bool]) -> None:
        seen[node] = True
        visit(node)
        for nxt in graph[node]:
            if not seen[nxt]:
                dfs(nxt, graph, seen)
- entry_id: graph-dfs-scala
  language: scala
  code: |-
    def dfs(node: Int, graph: Vector[Vector[Int]], seen: Array[Boolean]): Unit =
      seen(node) = true
      visit(node)
      for next <- graph(node) do
        if !seen(next) then dfs(next, graph, seen)
- entry_id: graph-dfs-cpp
  language: cpp
  code: |-
    void dfs(int node, const std::vector<std::vector<int>>& graph, std::vector<bool>& seen) {
        seen[node] = true;
        visit(node);
        for (int next : graph[node]) {
            if (!seen[next]) dfs(next, graph, seen);
        }
    }
