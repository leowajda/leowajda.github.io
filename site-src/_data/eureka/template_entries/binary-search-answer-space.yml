- entry_id: binary-search-answer-space-java
  language: java
  code: |-
    int firstFeasible(int low, int high) {
        while (low < high) {
            int mid = low + (high - low) / 2;
            if (feasible(mid)) high = mid;
            else low = mid + 1;
        }
        return low;
    }
- entry_id: binary-search-answer-space-python
  language: python
  code: |-
    def first_feasible(low: int, high: int) -> int:
        while low < high:
            mid = low + (high - low) // 2
            if feasible(mid):
                high = mid
            else:
                low = mid + 1
        return low
