- entry_id: greedy-sort-java
  language: java
  code: |-
    int greedyAfterSort(List<Item> items) {
        items.sort(this::priority);
        int answer = initial();
        for (Item item : items) {
            if (compatible(item)) answer = take(answer, item);
        }
        return answer;
    }
- entry_id: greedy-sort-python
  language: python
  code: |-
    def greedy_after_sort(items) -> int:
        answer = initial()
        for item in sorted(items, key=priority):
            if compatible(item):
                answer = take(answer, item)
        return answer
