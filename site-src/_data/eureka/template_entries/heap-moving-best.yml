- entry_id: heap-moving-best-scala
  language: scala
  code: |-
    def processWithBest(events: Iterable[Event]): Unit =
      val heap = scala.collection.mutable.PriorityQueue[State]()(betterFirst)
      for event <- events do
        addCandidates(heap, event)
        while heap.nonEmpty && stale(heap.head, event) do heap.dequeue()
        useBest(heap.head, event)
- entry_id: heap-moving-best-cpp
  language: cpp
  code: |-
    void processWithBest(const std::vector<Event>& events) {
        std::priority_queue<State, std::vector<State>, BetterFirst> heap;
        for (const Event& event : events) {
            addCandidates(heap, event);
            while (!heap.empty() && stale(heap.top(), event)) heap.pop();
            useBest(heap.top(), event);
        }
    }
