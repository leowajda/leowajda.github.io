- entry_id: bitmask-enumeration-java
  language: java
  code: |-
    void enumerate(int n) {
        for (int mask = 0; mask < (1 << n); mask++) {
            for (int bit = 0; bit < n; bit++) {
                if ((mask & (1 << bit)) != 0) use(bit);
            }
            finish(mask);
        }
    }
- entry_id: bitmask-enumeration-python
  language: python
  code: |-
    def enumerate(n: int) -> None:
        for mask in range(1 << n):
            for bit in range(n):
                if mask & (1 << bit):
                    use(bit)
            finish(mask)
- entry_id: bitmask-enumeration-scala
  language: scala
  code: |-
    def enumerate(n: Int): Unit =
      for mask <- 0 until (1 << n) do
        for bit <- 0 until n do
          if (mask & (1 << bit)) != 0 then use(bit)
        finish(mask)
