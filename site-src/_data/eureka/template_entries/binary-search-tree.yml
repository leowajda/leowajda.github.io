- entry_id: binary-search-tree-java
  language: java
  code: |-
    boolean contains(TreeNode node, int target) {
        while (node != null) {
            if (node.value == target) return true;
            node = target < node.value ? node.left : node.right;
        }
        return false;
    }
- entry_id: binary-search-tree-python
  language: python
  code: |-
    def contains(node, target: int) -> bool:
        while node:
            if node.value == target:
                return True
            node = node.left if target < node.value else node.right
        return False
