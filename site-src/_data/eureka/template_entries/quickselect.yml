- entry_id: quickselect-java
  language: java
  code: |-
    int select(int[] values, int k) {
        int left = 0;
        int right = values.length - 1;
        while (left <= right) {
            int pivot = partition(values, left, right);
            if (pivot == k) return values[pivot];
            if (pivot < k) left = pivot + 1;
            else right = pivot - 1;
        }
        return -1;
    }
- entry_id: quickselect-python
  language: python
  code: |-
    def select(values: list[int], k: int) -> int:
        left, right = 0, len(values) - 1
        while left <= right:
            pivot = partition(values, left, right)
            if pivot == k:
                return values[pivot]
            if pivot < k:
                left = pivot + 1
            else:
                right = pivot - 1
        return -1
