- entry_id: fenwick-tree-java
  language: java
  code: |-
    class FenwickTree {
        int[] tree;

        FenwickTree(int n) {
            tree = new int[n + 1];
        }

        void add(int index, int delta) {
            for (index++; index < tree.length; index += index & -index) tree[index] += delta;
        }

        int sum(int index) {
            int total = 0;
            for (index++; index > 0; index -= index & -index) total += tree[index];
            return total;
        }
    }
- entry_id: fenwick-tree-python
  language: python
  code: |-
    class FenwickTree:
        def __init__(self, n: int):
            self.tree = [0] * (n + 1)

        def add(self, index: int, delta: int) -> None:
            index += 1
            while index < len(self.tree):
                self.tree[index] += delta
                index += index & -index

        def sum(self, index: int) -> int:
            total = 0
            index += 1
            while index > 0:
                total += self.tree[index]
                index -= index & -index
            return total
