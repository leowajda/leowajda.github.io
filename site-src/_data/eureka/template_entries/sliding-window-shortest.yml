- entry_id: sliding-window-shortest-java
  language: java
  code: |-
    int shortestWindow(int[] values) {
        int best = values.length + 1;
        for (int left = 0, right = 0; right < values.length; right++) {
            add(values[right]);
            while (valid()) {
                best = Math.min(best, right - left + 1);
                remove(values[left++]);
            }
        }
        return best == values.length + 1 ? 0 : best;
    }
- entry_id: sliding-window-shortest-python
  language: python
  code: |-
    def shortest_window(values: list[int]) -> int:
        left = 0
        best = len(values) + 1
        for right, value in enumerate(values):
            add(value)
            while valid():
                best = min(best, right - left + 1)
                remove(values[left])
                left += 1
        return 0 if best == len(values) + 1 else best
