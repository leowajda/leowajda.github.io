    def scan_directions(grid, row: int, col: int) -> None:
        for dr, dc in ((1, 0), (-1, 0), (0, 1), (0, -1)):
            r, c = row + dr, col + dc
            while inside(grid, r, c):
                visit(r, c)
                r += dr
                c += dc
- entry_id: matrix-direction-scan-scala
  language: scala
  code: |-
    def scanDirections(grid: Array[Array[Int]], row: Int, col: Int): Unit =
      for (dr, dc) <- Array((1, 0), (-1, 0), (0, 1), (0, -1)) do
        var r = row + dr
        var c = col + dc
        while inside(grid, r, c) do
          visit(r, c)
          r += dr
          c += dc
- entry_id: matrix-direction-scan-cpp
  language: cpp
  code: |-
    void scanDirections(const std::vector<std::vector<int>>& grid, int row, int col) {
        std::vector<std::pair<int, int>> dirs{{1, 0}, {-1, 0}, {0, 1}, {0, -1}};
        for (auto [dr, dc] : dirs) {
            int r = row + dr, c = col + dc;
            while (inside(grid, r, c)) {
                visit(r, c);
                r += dr;
                c += dc;
            }
        }
    }
