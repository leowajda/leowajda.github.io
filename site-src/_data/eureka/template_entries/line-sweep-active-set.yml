- entry_id: line-sweep-active-set-scala
  language: scala
  code: |-
    def sweepWithActiveSet(events: Vector[Event]): Unit =
      val active = scala.collection.mutable.TreeSet[Item]()(itemOrder)
      for event <- events.sortBy(eventOrder) do
        if event.starts then active += event.item
        else active -= event.item
        use(active, event)
- entry_id: line-sweep-active-set-cpp
  language: cpp
  code: |-
    void sweepWithActiveSet(std::vector<Event> events) {
        std::sort(events.begin(), events.end(), eventOrder);
        std::set<Item, ItemOrder> active;
        for (const Event& event : events) {
            if (event.starts) active.insert(event.item);
            else active.erase(event.item);
            use(active, event);
        }
    }
