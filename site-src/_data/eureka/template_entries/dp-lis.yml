- entry_id: dp-lis-java
  language: java
  code: |-
    int increasingSubsequenceLength(int[] values) {
        int[] tails = new int[values.length];
        int size = 0;
        for (int value : values) {
            int i = lowerBound(tails, size, value);
            tails[i] = value;
            if (i == size) size++;
        }
        return size;
    }
- entry_id: dp-lis-python
  language: python
  code: |-
    def increasing_subsequence_length(values: list[int]) -> int:
        tails = []
        for value in values:
            i = lower_bound(tails, value)
            if i == len(tails):
                tails.append(value)
            else:
                tails[i] = value
        return len(tails)
