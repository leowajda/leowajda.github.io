- entry_id: binary-search-java
  language: java
  code: |-
    int lowerBound(int[] values, int target) {
        int left = 0;
        int right = values.length;
        while (left < right) {
            int mid = left + (right - left) / 2;
            if (values[mid] < target) left = mid + 1;
            else right = mid;
        }
        return left;
    }
- entry_id: binary-search-python
  language: python
  code: |-
    def lower_bound(values: list[int], target: int) -> int:
        left, right = 0, len(values)
        while left < right:
            mid = left + (right - left) // 2
            if values[mid] < target:
                left = mid + 1
            else:
                right = mid
        return left
