{%- assign browser = page.browser_record | default: empty -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": {{ page.title | jsonify }},
  "description": {{ include.page_description | jsonify }},
  "url": {{ include.page_url | jsonify }},
  "author": {{ include.person_json | strip }},
  "about": {{ browser.project_title | default: page.project_slug | jsonify }}
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": {{ '/' | absolute_url | jsonify }}
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ page.title | jsonify }},
      "item": {{ include.page_url | jsonify }}
    }
  ]
}
</script>
{%- if browser and browser.problems and browser.problems.size > 0 -%}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": {{ page.title | jsonify }},
    "itemListElement": [
      {%- for problem_record in browser.problems -%}
        {
          "@type": "ListItem",
          "position": {{ forloop.index }},
          "name": {{ problem_record.title | jsonify }},
          "url": {{ problem_record.url | absolute_url | jsonify }}
        }{% unless forloop.last %},{% endunless %}
      {%- endfor -%}
    ]
  }
  </script>
{%- endif -%}
