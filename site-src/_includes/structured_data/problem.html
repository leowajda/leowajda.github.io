{%- assign problem_record = page.problem_record | default: page -%}
{%- assign implementations = problem_record.implementations | default: empty -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": ["TechArticle", "LearningResource"],
  "headline": {{ problem_record.title | jsonify }},
  "description": {{ include.page_description | jsonify }},
  "url": {{ include.page_url | jsonify }},
  "author": {{ include.person_json | strip }},
  "publisher": {{ include.person_json | strip }},
  "educationalUse": "practice",
  "learningResourceType": "Algorithm problem solution",
  "keywords": {{ problem_record.categories | default: empty | jsonify }},
  "isBasedOn": {{ problem_record.problem_source_url | jsonify }},
  "hasPart": [
    {%- for implementation in implementations -%}
      {%- assign implementation_name = implementation.title | default: '' -%}
      {%- if implementation_name == '' -%}
        {%- assign implementation_name = implementation.language_label | append: ' ' | append: implementation.approach_label -%}
      {%- endif -%}
      {
        "@type": "SoftwareSourceCode",
        "name": {{ implementation_name | jsonify }},
        "url": {{ implementation.detail_url | absolute_url | jsonify }},
        "codeRepository": {{ implementation.source_url | jsonify }},
        "programmingLanguage": {{ implementation.language_label | jsonify }},
        "description": {{ implementation.description | default: implementation.approach_label | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {%- endfor -%}
  ]
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": {{ '/' | absolute_url | jsonify }}
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Problem Explorer",
      "item": {{ site.data.site.pages.problem_explorer.url | absolute_url | jsonify }}
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ problem_record.title | jsonify }},
      "item": {{ include.page_url | jsonify }}
    }
  ]
}
</script>
