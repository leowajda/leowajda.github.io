<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url={{ page.redirect_to | relative_url }}" />
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="{{ page.redirect_to | relative_url }}" />
    <title>{{ page.title | default: "Redirecting" }}</title>
    <script>
      window.location.replace({{ page.redirect_to | relative_url | jsonify }})
    </script>
  </head>
  <body>
    <p><a href="{{ page.redirect_to | relative_url }}">Continue</a></p>
  </body>
</html>
