title: Leonardo Wajda
author: Leonardo Wajda
email: dev.leowajda@tuta.io
url: https://leowajda.github.io
baseurl: ""
description: "A focused personal website for algorithm solutions, source notes, and technical writing."

markdown: kramdown
highlighter: rouge

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

theme_config:
  appearance: "auto"
  date_format: "%Y-%m-%d"
  show_description: true
  lowercase_titles: false

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: "eureka"
      type: pages
    values:
      layout: problems
      project_key: eureka
      custom_js:
        - eureka-filters

generated_data_namespace: generated
